# conf fixture — exercises direct decoding of .conf content by extension.
# Styled after an nginx server block; the loader treats it as plain text.

server {
    listen 8080;
    server_name fixtures.example.com;

    # FORMAT_MARKER_CONF

    location /documents {
        proxy_pass http://upstream-loader;
        proxy_read_timeout 30s;
    }

    location /health {
        return 200 "ok";
    }
}
